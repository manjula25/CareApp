services:
  # ── POC mode (default) ────────────────────────────────────
  # Uses the stock hapiproject/hapi image with signature-only JWT validation.
  # For production (Open Question 8), comment out this hapi-fhir block and
  # use the hapi-fhir-prod + keycloak + hapi-db blocks below.
  hapi-fhir:
    image: hapiproject/hapi:v7.2.0
    ports:
      - "8080:8080"
    environment:
      hapi.fhir.default_encoding: json
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_external_references: "true"
      hapi.fhir.narrative_enabled: "false"
      # S6 A2 — stock HAPI ships with rest-hook Subscription delivery OFF; a
      # Subscription created without this stays status 'requested' forever
      # instead of HAPI activating it to 'active' and actually POSTing to the
      # channel endpoint on matching Task changes (verified against this
      # image: unset, a rest-hook Subscription never leaves 'requested').
      hapi.fhir.subscription.resthook_enabled: "true"
      # S14 Commit 4 (B) — enable JWT validation on inbound HAPI calls. These
      # env-var keys match the OAuthAuthorizationServletFilter config in
      # hapiproject/hapi:v7.2.0. The public key is bind-mounted read-only
      # from apps/api/src/smart/keys/smart-public.pem below. Phase D curl
      # tests (401 without token / 200 with valid token) are deferred in this
      # commit and documented in the commit body; the env-var NAMES here are
      # the best-known HAPI v7.2.0 keys and may need adjustment if HAPI logs
      # show a different prefix on first boot (see verification-s14.md §D).
      hapi.fhir.security.oauth.enable_jwt_validation: "true"
      hapi.fhir.security.oauth.public_key_location: file:/keys/smart-public.pem
    volumes:
      - hapi-data:/data/hapi
      # S14 Commit 4 (B) — bind-mount the SMART client's public key
      # (extracted from apps/api/src/smart/keys.ts) into HAPI so its
      # OAuthAuthorizationServletFilter can verify access-token signatures.
      # Read-only so a HAPI container compromise can't rewrite our key.
      - ./apps/api/src/smart/keys:/keys:ro
    # No container healthcheck: this image ships no shell/wget/curl to run one.
    # Readiness is verified host-side by the import script's retry loop against
    # GET /fhir/metadata (see apps/api/src/scripts/import-fhir.ts).

  # ── Production mode (Open Question 8) ─────────────────────
  # Uncomment the blocks below to switch to production SMART scope enforcement.
  # Requires: hapi-fhir-jpaserver-starter cloned at ./hapi-fhir-jpaserver-starter
  # with application.yaml configured for OAuth scope enforcement + Keycloak JWKS.
  # See docs/plans/caresync-ai/prd-production-smart-scope.md for full setup.
  #
  # hapi-fhir-prod:
  #   build:
  #     context: ./hapi-fhir-jpaserver-starter
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://hapi-db:5432/hapi
  #     SPRING_DATASOURCE_USERNAME: hapi
  #     SPRING_DATASOURCE_PASSWORD: ${HAPI_DB_PASSWORD:-hapi}
  #   depends_on:
  #     - hapi-db
  #     - keycloak
  #   volumes:
  #     - ./hapi-fhir-jpaserver-starter/src/main/resources/application.yaml:/app/application.yaml:ro
  #
  # hapi-db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: hapi
  #     POSTGRES_USER: hapi
  #     POSTGRES_PASSWORD: ${HAPI_DB_PASSWORD:-hapi}
  #   volumes:
  #     - hapi-db-data:/var/lib/postgresql/data
  #
  # keycloak:
  #   image: quay.io/keycloak/keycloak:24.0
  #   ports:
  #     - "8443:8443"
  #   environment:
  #     KEYCLOAK_ADMIN: admin
  #     KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
  #     KC_HOSTNAME: localhost
  #   command: ["start-dev"]
  #   volumes:
  #     - keycloak-data:/opt/keycloak/data

volumes:
  hapi-data:
  # hapi-db-data:
  # keycloak-data:
