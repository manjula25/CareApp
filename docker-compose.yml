services:
  hapi-fhir:
    image: hapiproject/hapi:v7.2.0
    ports:
      - "8080:8080"
    environment:
      hapi.fhir.default_encoding: json
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_external_references: "true"
      hapi.fhir.narrative_enabled: "false"
      # S6 A2 — stock HAPI ships with rest-hook Subscription delivery OFF; a
      # Subscription created without this stays status 'requested' forever
      # instead of HAPI activating it to 'active' and actually POSTing to the
      # channel endpoint on matching Task changes (verified against this
      # image: unset, a rest-hook Subscription never leaves 'requested').
      hapi.fhir.subscription.resthook_enabled: "true"
    volumes:
      - hapi-data:/data/hapi
    # No container healthcheck: this image ships no shell/wget/curl to run one.
    # Readiness is verified host-side by the import script's retry loop against
    # GET /fhir/metadata (see apps/api/src/scripts/import-fhir.ts).

volumes:
  hapi-data:
